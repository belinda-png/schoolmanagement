{% extends 'management/base.html' %}

{% block title %}Mark Attendance - School Management{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Mark Attendance</h1>
    <a href="{% url 'attendance_list' %}" class="btn-primary" style="background: #64748b;">
        <span>←</span> Back to Attendance
    </a>
</div>

<div class="table-container" style="max-width: 800px; margin: 0 auto;">
    <form method="post" style="padding: 30px;">
        {% csrf_token %}
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #374151;">Student *</label>
                {{ form.student }}
                <style>
                    #id_student { width: 100%; padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
                    #id_student:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
                </style>
            </div>
            
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #374151;">Date *</label>
                {{ form.date }}
                <style>
                    #id_date { width: 100%; padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
                    #id_date:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
                </style>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #374151;">Status *</label>
                {{ form.status }}
                <style>
                    #id_status { width: 100%; padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
                    #id_status:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
                </style>
            </div>
            
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #374151;">Teacher Marking *</label>
                {{ form.teacher_marking }}
                <style>
                    #id_teacher_marking { width: 100%; padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
                    #id_teacher_marking:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
                </style>
            </div>
        </div>

        <div style="display: flex; gap: 15px; justify-content: flex-end;">
            <a href="{% url 'attendance_list' %}" style="padding: 12px 24px; border: 1px solid #e2e8f0; background: white; border-radius: 8px; text-decoration: none; color: #64748b; font-weight: 500; transition: all 0.2s;">
                Cancel
            </a>
            <button type="submit" class="btn-primary">
                Mark Attendance
            </button>
        </div>
    </form>
</div>
{% endblock %}
